services:
  postgres:
    image: postgres:15-alpine
    container_name: blackjack-postgres
    environment:
      POSTGRES_USER: blackjack
      POSTGRES_PASSWORD: blackjack
      POSTGRES_DB: blackjack
    ports:
      - "5435:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - blackjack
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blackjack -d blackjack"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  redis-room:
    image: redis:7-alpine
    container_name: blackjack-redis-room
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6380:6379"
    volumes:
      - redis_room_data:/data
    networks:
      - blackjack
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  redis-rate-limit:
    image: redis:7-alpine
    container_name: blackjack-redis-rate-limit
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6381:6379"
    volumes:
      - redis_rate_limit_data:/data
    networks:
      - blackjack
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: blackjack-backend
    environment:
      DATABASE_URL: postgres://blackjack:blackjack@postgres:5432/blackjack?sslmode=disable
      REDIS_ROOM_ADDR: redis-room:6379
      REDIS_RATE_LIMIT_ADDR: redis-rate-limit:6379
      JWT_SECRET: dev-jwt-secret-change-me-32chars!!
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis-room:
        condition: service_healthy
      redis-rate-limit:
        condition: service_healthy
    networks:
      - blackjack
    restart: unless-stopped

networks:
  blackjack:
    name: blackjack-net

volumes:
  pgdata:
  redis_room_data:
  redis_rate_limit_data:

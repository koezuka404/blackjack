services:
  postgres:
    image: postgres:15-alpine
    container_name: blackjack-postgres
    environment:
      POSTGRES_USER: blackjack
      POSTGRES_PASSWORD: blackjack
      POSTGRES_DB: blackjack
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - blackjack
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blackjack -d blackjack"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: blackjack-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - blackjack
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: blackjack-backend
    environment:
      DATABASE_URL: postgres://blackjack:blackjack@postgres:5432/blackjack?sslmode=disable
      REDIS_ADDR: redis:6379
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - blackjack
    restart: unless-stopped

networks:
  blackjack:
    name: blackjack-net

volumes:
  pgdata:
  redisdata:

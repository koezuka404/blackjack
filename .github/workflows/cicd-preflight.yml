name: CI/CD Preflight

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * 1"

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - name: Validate required secrets are configured
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          STAGING_DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
          STAGING_BACKEND_HEALTHCHECK_URL: ${{ secrets.STAGING_BACKEND_HEALTHCHECK_URL }}
          STAGING_API_BASE_URL: ${{ secrets.STAGING_API_BASE_URL }}
          STAGING_WS_BASE_URL: ${{ secrets.STAGING_WS_BASE_URL }}
          PRODUCTION_DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
          PRODUCTION_BACKEND_HEALTHCHECK_URL: ${{ secrets.PRODUCTION_BACKEND_HEALTHCHECK_URL }}
          PRODUCTION_API_BASE_URL: ${{ secrets.PRODUCTION_API_BASE_URL }}
          PRODUCTION_WS_BASE_URL: ${{ secrets.PRODUCTION_WS_BASE_URL }}
        run: |
          set -euo pipefail
          for key in \
            VERCEL_TOKEN VERCEL_PROJECT_ID VERCEL_ORG_ID \
            STAGING_DATABASE_URL STAGING_BACKEND_HEALTHCHECK_URL STAGING_API_BASE_URL STAGING_WS_BASE_URL \
            PRODUCTION_DATABASE_URL PRODUCTION_BACKEND_HEALTHCHECK_URL PRODUCTION_API_BASE_URL PRODUCTION_WS_BASE_URL; do
            val="${!key:-}"
            if [ -z "$val" ]; then
              echo "Missing secret: $key"
              exit 1
            fi
          done

      - name: Validate secret formats (URL/DSN)
        env:
          STAGING_DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
          PRODUCTION_DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
          STAGING_BACKEND_HEALTHCHECK_URL: ${{ secrets.STAGING_BACKEND_HEALTHCHECK_URL }}
          PRODUCTION_BACKEND_HEALTHCHECK_URL: ${{ secrets.PRODUCTION_BACKEND_HEALTHCHECK_URL }}
          STAGING_API_BASE_URL: ${{ secrets.STAGING_API_BASE_URL }}
          PRODUCTION_API_BASE_URL: ${{ secrets.PRODUCTION_API_BASE_URL }}
          STAGING_WS_BASE_URL: ${{ secrets.STAGING_WS_BASE_URL }}
          PRODUCTION_WS_BASE_URL: ${{ secrets.PRODUCTION_WS_BASE_URL }}
        run: |
          set -euo pipefail
          [[ "$STAGING_DATABASE_URL" =~ ^postgres:// ]] || (echo "STAGING_DATABASE_URL must start with postgres://"; exit 1)
          [[ "$PRODUCTION_DATABASE_URL" =~ ^postgres:// ]] || (echo "PRODUCTION_DATABASE_URL must start with postgres://"; exit 1)
          [[ "$STAGING_BACKEND_HEALTHCHECK_URL" =~ ^https?:// ]] || (echo "STAGING_BACKEND_HEALTHCHECK_URL must start with http:// or https://"; exit 1)
          [[ "$PRODUCTION_BACKEND_HEALTHCHECK_URL" =~ ^https?:// ]] || (echo "PRODUCTION_BACKEND_HEALTHCHECK_URL must start with http:// or https://"; exit 1)
          [[ "$STAGING_API_BASE_URL" =~ ^https?:// ]] || (echo "STAGING_API_BASE_URL must start with http:// or https://"; exit 1)
          [[ "$PRODUCTION_API_BASE_URL" =~ ^https?:// ]] || (echo "PRODUCTION_API_BASE_URL must start with http:// or https://"; exit 1)
          [[ "$STAGING_WS_BASE_URL" =~ ^wss?:// ]] || (echo "STAGING_WS_BASE_URL must start with ws:// or wss://"; exit 1)
          [[ "$PRODUCTION_WS_BASE_URL" =~ ^wss?:// ]] || (echo "PRODUCTION_WS_BASE_URL must start with ws:// or wss://"; exit 1)

      - name: Validate staging and production health endpoints
        env:
          STAGING_BACKEND_HEALTHCHECK_URL: ${{ secrets.STAGING_BACKEND_HEALTHCHECK_URL }}
          PRODUCTION_BACKEND_HEALTHCHECK_URL: ${{ secrets.PRODUCTION_BACKEND_HEALTHCHECK_URL }}
        run: |
          set -euo pipefail
          curl -fsS "$STAGING_BACKEND_HEALTHCHECK_URL" >/dev/null
          curl -fsS "$PRODUCTION_BACKEND_HEALTHCHECK_URL" >/dev/null

      - name: Append preflight summary
        if: always()
        run: |
          {
            echo "## CI/CD Preflight Summary"
            echo ""
            echo "- required secrets: checked"
            echo "- secret formats (URL/DSN): checked"
            echo "- staging health endpoint: checked"
            echo "- production health endpoint: checked"
          } >> "$GITHUB_STEP_SUMMARY"

  notify-preflight-failure:
    runs-on: ubuntu-latest
    needs: [preflight]
    if: failure()
    steps:
      - name: Notify Slack on preflight failure
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          REF_NAME: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          SHA: ${{ github.sha }}
        run: |
          if [ -z "${SLACK_WEBHOOK_URL:-}" ]; then
            echo "SLACK_WEBHOOK_URL is not configured; skipping notification."
            exit 0
          fi
          MSG="Preflight failed: ${REPO} @ ${REF_NAME} actor=${ACTOR} sha=${SHA}. https://github.com/${REPO}/actions/runs/${RUN_ID}"
          payload=$(printf '{"text":"%s"}' "$MSG")
          curl -fsS -X POST -H "Content-Type: application/json" --data "$payload" "$SLACK_WEBHOOK_URL"

  notify-preflight-success:
    runs-on: ubuntu-latest
    needs: [preflight]
    if: success()
    steps:
      - name: Notify Slack on preflight success
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          REF_NAME: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          SHA: ${{ github.sha }}
        run: |
          if [ -z "${SLACK_WEBHOOK_URL:-}" ]; then
            echo "SLACK_WEBHOOK_URL is not configured; skipping notification."
            exit 0
          fi
          MSG="Preflight success: ${REPO} @ ${REF_NAME} actor=${ACTOR} sha=${SHA}. https://github.com/${REPO}/actions/runs/${RUN_ID}"
          payload=$(printf '{"text":"%s"}' "$MSG")
          curl -fsS -X POST -H "Content-Type: application/json" --data "$payload" "$SLACK_WEBHOOK_URL"

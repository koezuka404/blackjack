name: Governance Check

on:
  workflow_dispatch:
  schedule:
    - cron: "30 2 * * 1"

jobs:
  branch-and-environment-policy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Validate branch protection and environment policies
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner
            const repo = context.repo.repo
            const branch = 'main'

            const requiredChecks = [
              'backend',
              'frontend',
              'integration',
              'migration-compatibility',
              'container-build',
              'security',
            ]

            function assertTrue(cond, message) {
              if (!cond) {
                core.setFailed(message)
              }
            }

            let protection
            try {
              const res = await github.rest.repos.getBranchProtection({
                owner,
                repo,
                branch,
              })
              protection = res.data
            } catch (e) {
              core.setFailed(`Cannot read branch protection for '${branch}'. Ensure branch protection is enabled and token has access.`)
              return
            }

            assertTrue(
              protection.required_pull_request_reviews != null,
              "main branch must require pull request reviews.",
            )
            assertTrue(
              protection.required_pull_request_reviews &&
                Number(protection.required_pull_request_reviews.required_approving_review_count || 0) >= 1,
              "main branch must require at least one approving review.",
            )
            assertTrue(
              protection.allow_force_pushes &&
                protection.allow_force_pushes.enabled === false,
              "main branch must disallow force pushes.",
            )
            assertTrue(
              protection.allow_deletions &&
                protection.allow_deletions.enabled === false,
              "main branch must disallow branch deletions.",
            )
            assertTrue(
              protection.required_status_checks != null,
              "main branch must enable required status checks.",
            )
            assertTrue(
              protection.required_status_checks &&
                protection.required_status_checks.strict === true,
              "main branch must require branches to be up to date before merging (strict checks).",
            )

            const checks =
              protection.required_status_checks &&
              Array.isArray(protection.required_status_checks.checks)
                ? protection.required_status_checks.checks.map((c) => c.context)
                : []

            for (const check of requiredChecks) {
              assertTrue(
                checks.includes(check),
                `Required status check missing on main: '${check}'`,
              )
            }

            let prodEnv
            try {
              const envRes = await github.rest.repos.getEnvironment({
                owner,
                repo,
                environment_name: 'production',
              })
              prodEnv = envRes.data
            } catch (e) {
              core.setFailed("production environment is missing.")
              return
            }

            const protectionRules = Array.isArray(prodEnv.protection_rules)
              ? prodEnv.protection_rules
              : []
            const hasRequiredReviewers = protectionRules.some(
              (rule) => rule.type === 'required_reviewers',
            )
            assertTrue(
              hasRequiredReviewers,
              "production environment must have required reviewers.",
            )

            core.summary
              .addHeading('Governance Check Summary')
              .addList([
                "main branch protection: OK",
                "main approving reviews >= 1: OK",
                "main force push disabled: OK",
                "main branch deletion disabled: OK",
                "required status checks: OK",
                "strict status checks: OK",
                "production environment: OK",
                "production required reviewers: OK",
              ])
              .write()

  notify-governance-failure:
    runs-on: ubuntu-latest
    needs: [branch-and-environment-policy]
    if: failure()
    steps:
      - name: Notify Slack on governance check failure
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          REF_NAME: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          SHA: ${{ github.sha }}
        run: |
          if [ -z "${SLACK_WEBHOOK_URL:-}" ]; then
            echo "SLACK_WEBHOOK_URL is not configured; skipping notification."
            exit 0
          fi
          MSG="Governance check failed: ${REPO} @ ${REF_NAME} actor=${ACTOR} sha=${SHA}. https://github.com/${REPO}/actions/runs/${RUN_ID}"
          payload=$(printf '{"text":"%s"}' "$MSG")
          curl -fsS -X POST -H "Content-Type: application/json" --data "$payload" "$SLACK_WEBHOOK_URL"

  notify-governance-success:
    runs-on: ubuntu-latest
    needs: [branch-and-environment-policy]
    if: success()
    steps:
      - name: Notify Slack on governance check success
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          REF_NAME: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          SHA: ${{ github.sha }}
        run: |
          if [ -z "${SLACK_WEBHOOK_URL:-}" ]; then
            echo "SLACK_WEBHOOK_URL is not configured; skipping notification."
            exit 0
          fi
          MSG="Governance check success: ${REPO} @ ${REF_NAME} actor=${ACTOR} sha=${SHA}. https://github.com/${REPO}/actions/runs/${RUN_ID}"
          payload=$(printf '{"text":"%s"}' "$MSG")
          curl -fsS -X POST -H "Content-Type: application/json" --data "$payload" "$SLACK_WEBHOOK_URL"

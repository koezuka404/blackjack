name: Load Test

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Target environment"
        required: true
        type: choice
        options:
          - staging
          - production
      vus:
        description: "Virtual users"
        required: false
        default: "100"
      duration:
        description: "Test duration (k6 format)"
        required: false
        default: "5m"
      ws_ratio:
        description: "WebSocket mix ratio (0.0-1.0)"
        required: false
        default: "0.3"
      ws_reconnect_ratio:
        description: "WebSocket reconnect ratio (0.0-1.0)"
        required: false
        default: "0.5"

jobs:
  k6:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.target }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate load test inputs
        env:
          TARGET: ${{ github.event.inputs.target }}
          VUS: ${{ github.event.inputs.vus }}
          DURATION: ${{ github.event.inputs.duration }}
          WS_RATIO: ${{ github.event.inputs.ws_ratio }}
          WS_RECONNECT_RATIO: ${{ github.event.inputs.ws_reconnect_ratio }}
        run: |
          set -euo pipefail
          test "$TARGET" = "staging" || test "$TARGET" = "production"
          [[ "$VUS" =~ ^[0-9]+$ ]] || (echo "vus must be numeric" && exit 1)
          [ "$VUS" -gt 0 ] || (echo "vus must be > 0" && exit 1)
          [[ "$DURATION" =~ ^[0-9]+[smh]$ ]] || (echo "duration must be like 300s, 5m, 1h" && exit 1)
          awk -v v="$WS_RATIO" 'BEGIN { exit !(v >= 0 && v <= 1) }' || (echo "ws_ratio must be between 0 and 1" && exit 1)
          awk -v v="$WS_RECONNECT_RATIO" 'BEGIN { exit !(v >= 0 && v <= 1) }' || (echo "ws_reconnect_ratio must be between 0 and 1" && exit 1)

      - name: Resolve API base URL by target
        id: resolve
        env:
          TARGET: ${{ github.event.inputs.target }}
          STAGING_API_BASE_URL: ${{ secrets.STAGING_API_BASE_URL }}
          PRODUCTION_API_BASE_URL: ${{ secrets.PRODUCTION_API_BASE_URL }}
          STAGING_WS_BASE_URL: ${{ secrets.STAGING_WS_BASE_URL }}
          PRODUCTION_WS_BASE_URL: ${{ secrets.PRODUCTION_WS_BASE_URL }}
        run: |
          set -euo pipefail
          if [ "$TARGET" = "staging" ]; then
            API_BASE_URL="$STAGING_API_BASE_URL"
            WS_BASE_URL="$STAGING_WS_BASE_URL"
          else
            API_BASE_URL="$PRODUCTION_API_BASE_URL"
            WS_BASE_URL="$PRODUCTION_WS_BASE_URL"
          fi
          test -n "$API_BASE_URL"
          test -n "$WS_BASE_URL"
          echo "api_base_url=$API_BASE_URL" >> "$GITHUB_OUTPUT"
          echo "ws_base_url=$WS_BASE_URL" >> "$GITHUB_OUTPUT"

      - name: Run k6 load test
        uses: grafana/run-k6-action@v1
        with:
          path: tests/load/k6-smoke.js
          flags: >-
            -e API_BASE_URL=${{ steps.resolve.outputs.api_base_url }}
            -e WS_BASE_URL=${{ steps.resolve.outputs.ws_base_url }}
            -e K6_VUS=${{ github.event.inputs.vus }}
            -e K6_DURATION=${{ github.event.inputs.duration }}
            -e K6_WS_RATIO=${{ github.event.inputs.ws_ratio }}
            -e K6_WS_RECONNECT_RATIO=${{ github.event.inputs.ws_reconnect_ratio }}

      - name: Append load test summary
        if: always()
        run: |
          {
            echo "## Load Test Summary"
            echo ""
            echo "- target: \`${{ github.event.inputs.target }}\`"
            echo "- vus: \`${{ github.event.inputs.vus }}\`"
            echo "- duration: \`${{ github.event.inputs.duration }}\`"
            echo "- ws_ratio: \`${{ github.event.inputs.ws_ratio }}\`"
            echo "- ws_reconnect_ratio: \`${{ github.event.inputs.ws_reconnect_ratio }}\`"
            echo "- api_base_url: ${{ steps.resolve.outputs.api_base_url }}"
            echo "- ws_base_url: ${{ steps.resolve.outputs.ws_base_url }}"
          } >> "$GITHUB_STEP_SUMMARY"

  notify-load-test-failure:
    runs-on: ubuntu-latest
    needs: [k6]
    if: failure()
    steps:
      - name: Notify Slack on load test failure
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          REF_NAME: ${{ github.ref_name }}
          TARGET: ${{ github.event.inputs.target }}
          ACTOR: ${{ github.actor }}
          SHA: ${{ github.sha }}
        run: |
          if [ -z "${SLACK_WEBHOOK_URL:-}" ]; then
            echo "SLACK_WEBHOOK_URL is not configured; skipping notification."
            exit 0
          fi
          MSG="Load test failed: ${REPO} target=${TARGET} @ ${REF_NAME} actor=${ACTOR} sha=${SHA}. https://github.com/${REPO}/actions/runs/${RUN_ID}"
          payload=$(printf '{"text":"%s"}' "$MSG")
          curl -fsS -X POST -H "Content-Type: application/json" --data "$payload" "$SLACK_WEBHOOK_URL"

  notify-load-test-success:
    runs-on: ubuntu-latest
    needs: [k6]
    if: success()
    steps:
      - name: Notify Slack on load test success
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          REF_NAME: ${{ github.ref_name }}
          TARGET: ${{ github.event.inputs.target }}
          ACTOR: ${{ github.actor }}
          SHA: ${{ github.sha }}
        run: |
          if [ -z "${SLACK_WEBHOOK_URL:-}" ]; then
            echo "SLACK_WEBHOOK_URL is not configured; skipping notification."
            exit 0
          fi
          MSG="Load test success: ${REPO} target=${TARGET} @ ${REF_NAME} actor=${ACTOR} sha=${SHA}. https://github.com/${REPO}/actions/runs/${RUN_ID}"
          payload=$(printf '{"text":"%s"}' "$MSG")
          curl -fsS -X POST -H "Content-Type: application/json" --data "$payload" "$SLACK_WEBHOOK_URL"

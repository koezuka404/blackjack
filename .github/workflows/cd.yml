name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  require-ci-success:
    runs-on: ubuntu-latest
    permissions:
      checks: read
      contents: read
    steps:
      - name: Ensure CI workflow succeeded for this commit
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner
            const repo = context.repo.repo
            const ref = context.sha

            const { data: checkRuns } = await github.rest.checks.listForRef({
              owner,
              repo,
              ref,
              per_page: 100,
            })

            const ciRuns = checkRuns.check_runs.filter((run) => run.name === 'CI')
            if (ciRuns.length === 0) {
              core.setFailed(`No CI check run found for commit ${ref}`)
              return
            }

            const hasSuccess = ciRuns.some((run) => run.conclusion === 'success')
            if (!hasSuccess) {
              const summaries = ciRuns.map((run) => `${run.name}:${run.status}:${run.conclusion}`).join(', ')
              core.setFailed(`CI has not succeeded for commit ${ref}. runs=${summaries}`)
              return
            }

            core.info(`CI success confirmed for commit ${ref}`)

  verify-secrets:
    runs-on: ubuntu-latest
    needs: [require-ci-success]
    steps:
      - name: Validate required secrets
        run: |
          test -n "${{ secrets.VERCEL_TOKEN }}"
          test -n "${{ secrets.VERCEL_PROJECT_ID }}"
          test -n "${{ secrets.VERCEL_ORG_ID }}"
          test -n "${{ secrets.STAGING_DATABASE_URL }}"
          test -n "${{ secrets.STAGING_BACKEND_HEALTHCHECK_URL }}"
          test -n "${{ secrets.STAGING_API_BASE_URL }}"
          test -n "${{ secrets.STAGING_WS_BASE_URL }}"
          test -n "${{ secrets.PRODUCTION_DATABASE_URL }}"
          test -n "${{ secrets.PRODUCTION_BACKEND_HEALTHCHECK_URL }}"
          test -n "${{ secrets.PRODUCTION_API_BASE_URL }}"
          test -n "${{ secrets.PRODUCTION_WS_BASE_URL }}"

  build-and-push-backend-image:
    runs-on: ubuntu-latest
    needs: [verify-secrets]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/blackjack-backend
          tags: |
            type=sha,prefix=
            type=raw,value=main
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  migrate-staging:
    runs-on: ubuntu-latest
    needs: [build-and-push-backend-image]
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - name: Run staging migration
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
        run: |
          test -n "$DATABASE_URL"
          cd backend
          go run ./migrations

  deploy-staging-vercel:
    runs-on: ubuntu-latest
    needs: [migrate-staging]
    environment: staging
    defaults:
      run:
        working-directory: frontend
    outputs:
      deployment_url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Install Vercel CLI
        run: npm i -g vercel@latest
      - name: Pull Vercel preview environment
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      - name: Build Vercel preview artifacts
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      - name: Deploy to Vercel preview
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> "$GITHUB_OUTPUT"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  smoke-test-staging:
    runs-on: ubuntu-latest
    needs: [deploy-staging-vercel]
    environment: staging
    steps:
      - name: Smoke test frontend deployment
        run: |
          test -n "${{ needs.deploy-staging-vercel.outputs.deployment_url }}"
          curl -fsS "${{ needs.deploy-staging-vercel.outputs.deployment_url }}" >/dev/null
      - name: Smoke test backend health
        env:
          BACKEND_HEALTHCHECK_URL: ${{ secrets.STAGING_BACKEND_HEALTHCHECK_URL }}
        run: |
          test -n "$BACKEND_HEALTHCHECK_URL"
          curl -fsS "$BACKEND_HEALTHCHECK_URL" >/dev/null
      - name: Smoke test backend API (/api/me and room create)
        env:
          API_BASE_URL: ${{ secrets.STAGING_API_BASE_URL }}
        run: |
          set -euo pipefail
          test -n "$API_BASE_URL"
          USERNAME="cd_smoke_$(date +%s)"
          PASSWORD="password12"
          SIGNUP_RESP=$(curl -fsS -H "Content-Type: application/json" \
            -d "{\"username\":\"$USERNAME\",\"password\":\"$PASSWORD\"}" \
            "$API_BASE_URL/auth/signup")
          TOKEN=$(echo "$SIGNUP_RESP" | jq -r '.data.access_token')
          test -n "$TOKEN" && test "$TOKEN" != "null"
          curl -fsS -H "Authorization: Bearer $TOKEN" \
            "$API_BASE_URL/me" | jq -e '.success == true' >/dev/null
          ROOM_RESP=$(curl -fsS -H "Authorization: Bearer $TOKEN" \
            -X POST "$API_BASE_URL/rooms")
          echo "$ROOM_RESP" | jq -e '.success == true' >/dev/null
          ROOM_ID=$(echo "$ROOM_RESP" | jq -r '.data.room.id')
          test -n "$ROOM_ID" && test "$ROOM_ID" != "null"
          echo "SMOKE_TOKEN=$TOKEN" >> "$GITHUB_ENV"
          echo "SMOKE_ROOM_ID=$ROOM_ID" >> "$GITHUB_ENV"
      - name: Smoke test websocket auth and sync
        env:
          WS_BASE_URL: ${{ secrets.STAGING_WS_BASE_URL }}
          API_BASE_URL: ${{ secrets.STAGING_API_BASE_URL }}
        run: |
          set -euo pipefail
          test -n "$WS_BASE_URL"
          test -n "$API_BASE_URL"
          test -n "${SMOKE_TOKEN:-}"
          test -n "${SMOKE_ROOM_ID:-}"
          node <<'NODE'
          const wsBase = process.env.WS_BASE_URL.replace(/\/+$/, '');
          const apiBase = process.env.API_BASE_URL.replace(/\/+$/, '');
          const roomID = process.env.SMOKE_ROOM_ID;
          const token = process.env.SMOKE_TOKEN;
          const url = `${wsBase}/rooms/${roomID}`;

          async function getHttpRoomState() {
            const resp = await fetch(`${apiBase}/rooms/${roomID}`, {
              headers: { Authorization: `Bearer ${token}` },
            });
            if (!resp.ok) {
              throw new Error(`http room fetch failed: ${resp.status}`);
            }
            const body = await resp.json();
            if (!body?.success || !body?.data?.room) {
              throw new Error('invalid http room payload');
            }
            return body.data;
          }

          function connectAndAuth(label, expectedVersion) {
            return new Promise((resolve, reject) => {
              const ws = new WebSocket(url);
              const timeout = setTimeout(() => {
                try { ws.close(); } catch {}
                reject(new Error(`${label}: timeout`));
              }, 8000);

              ws.onopen = () => {
                ws.send(JSON.stringify({
                  type: 'AUTH',
                  request_id: `smoke-auth-${label}`,
                  access_token: token,
                }));
              };

              ws.onmessage = (evt) => {
                let msg;
                try {
                  msg = JSON.parse(String(evt.data));
                } catch (e) {
                  return reject(new Error(`${label}: invalid JSON message`));
                }
                if (msg.type === 'ROOM_STATE_SYNC') {
                  if (!msg.data || !msg.data.room || msg.data.room.id !== roomID) {
                    clearTimeout(timeout);
                    ws.close();
                    reject(new Error(`${label}: room state mismatch`));
                    return;
                  }
                  if (!msg.data.session || typeof msg.data.session.version !== 'number') {
                    clearTimeout(timeout);
                    ws.close();
                    reject(new Error(`${label}: invalid session payload`));
                    return;
                  }
                  if (typeof expectedVersion === 'number' && msg.data.session.version !== expectedVersion) {
                    clearTimeout(timeout);
                    ws.close();
                    reject(new Error(`${label}: session version mismatch http=${expectedVersion} ws=${msg.data.session.version}`));
                    return;
                  }
                  clearTimeout(timeout);
                  ws.close();
                  resolve(msg);
                }
                if (msg.type === 'ERROR') {
                  clearTimeout(timeout);
                  ws.close();
                  reject(new Error(`${label}: ws error ${msg?.error?.code || 'unknown'}`));
                }
              };

              ws.onerror = () => {
                clearTimeout(timeout);
                reject(new Error(`${label}: websocket error`));
              };
            });
          }

          (async () => {
            const httpState = await getHttpRoomState();
            const expectedVersion = Number(httpState?.session?.version);
            await connectAndAuth('first', Number.isFinite(expectedVersion) ? expectedVersion : undefined);
            await connectAndAuth('second', Number.isFinite(expectedVersion) ? expectedVersion : undefined);
            process.exit(0);
          })().catch((err) => {
            console.error(err.message);
            process.exit(1);
          });
          NODE

  migrate-production:
    runs-on: ubuntu-latest
    needs: [smoke-test-staging]
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - name: Run production migration
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
        run: |
          test -n "$DATABASE_URL"
          cd backend
          go run ./migrations

  deploy-production-vercel:
    runs-on: ubuntu-latest
    needs: [migrate-production]
    environment: production
    defaults:
      run:
        working-directory: frontend
    outputs:
      deployment_url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Install Vercel CLI
        run: npm i -g vercel@latest
      - name: Pull Vercel production environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      - name: Build Vercel production artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      - name: Deploy to Vercel production
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> "$GITHUB_OUTPUT"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  smoke-test-production:
    runs-on: ubuntu-latest
    needs: [deploy-production-vercel]
    environment: production
    steps:
      - name: Smoke test production frontend deployment
        run: |
          test -n "${{ needs.deploy-production-vercel.outputs.deployment_url }}"
          curl -fsS "${{ needs.deploy-production-vercel.outputs.deployment_url }}" >/dev/null
      - name: Smoke test production backend health
        env:
          BACKEND_HEALTHCHECK_URL: ${{ secrets.PRODUCTION_BACKEND_HEALTHCHECK_URL }}
        run: |
          test -n "$BACKEND_HEALTHCHECK_URL"
          curl -fsS "$BACKEND_HEALTHCHECK_URL" >/dev/null
      - name: Smoke test production API (/api/me and room create)
        env:
          API_BASE_URL: ${{ secrets.PRODUCTION_API_BASE_URL }}
        run: |
          set -euo pipefail
          test -n "$API_BASE_URL"
          USERNAME="cd_prod_smoke_$(date +%s)"
          PASSWORD="password12"
          SIGNUP_RESP=$(curl -fsS -H "Content-Type: application/json" \
            -d "{\"username\":\"$USERNAME\",\"password\":\"$PASSWORD\"}" \
            "$API_BASE_URL/auth/signup")
          TOKEN=$(echo "$SIGNUP_RESP" | jq -r '.data.access_token')
          test -n "$TOKEN" && test "$TOKEN" != "null"
          curl -fsS -H "Authorization: Bearer $TOKEN" \
            "$API_BASE_URL/me" | jq -e '.success == true' >/dev/null
          ROOM_RESP=$(curl -fsS -H "Authorization: Bearer $TOKEN" \
            -X POST "$API_BASE_URL/rooms")
          echo "$ROOM_RESP" | jq -e '.success == true' >/dev/null
          ROOM_ID=$(echo "$ROOM_RESP" | jq -r '.data.room.id')
          test -n "$ROOM_ID" && test "$ROOM_ID" != "null"
          echo "PROD_SMOKE_TOKEN=$TOKEN" >> "$GITHUB_ENV"
          echo "PROD_SMOKE_ROOM_ID=$ROOM_ID" >> "$GITHUB_ENV"
      - name: Smoke test production websocket auth and sync
        env:
          WS_BASE_URL: ${{ secrets.PRODUCTION_WS_BASE_URL }}
          API_BASE_URL: ${{ secrets.PRODUCTION_API_BASE_URL }}
        run: |
          set -euo pipefail
          test -n "$WS_BASE_URL"
          test -n "$API_BASE_URL"
          test -n "${PROD_SMOKE_TOKEN:-}"
          test -n "${PROD_SMOKE_ROOM_ID:-}"
          node <<'NODE'
          const wsBase = process.env.WS_BASE_URL.replace(/\/+$/, '');
          const apiBase = process.env.API_BASE_URL.replace(/\/+$/, '');
          const roomID = process.env.PROD_SMOKE_ROOM_ID;
          const token = process.env.PROD_SMOKE_TOKEN;
          const url = `${wsBase}/rooms/${roomID}`;

          async function getHttpRoomState() {
            const resp = await fetch(`${apiBase}/rooms/${roomID}`, {
              headers: { Authorization: `Bearer ${token}` },
            });
            if (!resp.ok) {
              throw new Error(`http room fetch failed: ${resp.status}`);
            }
            const body = await resp.json();
            if (!body?.success || !body?.data?.room) {
              throw new Error('invalid http room payload');
            }
            return body.data;
          }

          function connectAndAuth(label, expectedVersion) {
            return new Promise((resolve, reject) => {
              const ws = new WebSocket(url);
              const timeout = setTimeout(() => {
                try { ws.close(); } catch {}
                reject(new Error(`${label}: timeout`));
              }, 8000);

              ws.onopen = () => {
                ws.send(JSON.stringify({
                  type: 'AUTH',
                  request_id: `prod-smoke-auth-${label}`,
                  access_token: token,
                }));
              };

              ws.onmessage = (evt) => {
                let msg;
                try {
                  msg = JSON.parse(String(evt.data));
                } catch (e) {
                  return reject(new Error(`${label}: invalid JSON message`));
                }
                if (msg.type === 'ROOM_STATE_SYNC') {
                  if (!msg.data || !msg.data.room || msg.data.room.id !== roomID) {
                    clearTimeout(timeout);
                    ws.close();
                    reject(new Error(`${label}: room state mismatch`));
                    return;
                  }
                  if (!msg.data.session || typeof msg.data.session.version !== 'number') {
                    clearTimeout(timeout);
                    ws.close();
                    reject(new Error(`${label}: invalid session payload`));
                    return;
                  }
                  if (typeof expectedVersion === 'number' && msg.data.session.version !== expectedVersion) {
                    clearTimeout(timeout);
                    ws.close();
                    reject(new Error(`${label}: session version mismatch http=${expectedVersion} ws=${msg.data.session.version}`));
                    return;
                  }
                  clearTimeout(timeout);
                  ws.close();
                  resolve(msg);
                }
                if (msg.type === 'ERROR') {
                  clearTimeout(timeout);
                  ws.close();
                  reject(new Error(`${label}: ws error ${msg?.error?.code || 'unknown'}`));
                }
              };

              ws.onerror = () => {
                clearTimeout(timeout);
                reject(new Error(`${label}: websocket error`));
              };
            });
          }

          (async () => {
            const httpState = await getHttpRoomState();
            const expectedVersion = Number(httpState?.session?.version);
            await connectAndAuth('first', Number.isFinite(expectedVersion) ? expectedVersion : undefined);
            await connectAndAuth('second', Number.isFinite(expectedVersion) ? expectedVersion : undefined);
            process.exit(0);
          })().catch((err) => {
            console.error(err.message);
            process.exit(1);
          });
          NODE

  summarize-cd:
    runs-on: ubuntu-latest
    needs: [deploy-staging-vercel, smoke-test-staging, deploy-production-vercel, smoke-test-production]
    if: always()
    steps:
      - name: Append CD summary
        run: |
          {
            echo "## CD Summary"
            echo ""
            echo "- staging deploy: \`${{ needs.deploy-staging-vercel.result }}\`"
            echo "- staging smoke: \`${{ needs.smoke-test-staging.result }}\`"
            echo "- production deploy: \`${{ needs.deploy-production-vercel.result }}\`"
            echo "- production smoke: \`${{ needs.smoke-test-production.result }}\`"
            echo ""
            echo "- staging deployment URL: ${{ needs.deploy-staging-vercel.outputs.deployment_url }}"
            echo "- production deployment URL: ${{ needs.deploy-production-vercel.outputs.deployment_url }}"
          } >> "$GITHUB_STEP_SUMMARY"

  notify-cd-success:
    runs-on: ubuntu-latest
    needs: [smoke-test-production]
    if: success()
    steps:
      - name: Notify Slack on CD success
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          REF_NAME: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          SHA: ${{ github.sha }}
        run: |
          if [ -z "${SLACK_WEBHOOK_URL:-}" ]; then
            echo "SLACK_WEBHOOK_URL is not configured; skipping notification."
            exit 0
          fi
          MSG="CD success: ${REPO} @ ${REF_NAME} actor=${ACTOR} sha=${SHA}. https://github.com/${REPO}/actions/runs/${RUN_ID}"
          payload=$(printf '{"text":"%s"}' "$MSG")
          curl -fsS -X POST -H "Content-Type: application/json" --data "$payload" "$SLACK_WEBHOOK_URL"

  notify-cd-failure:
    runs-on: ubuntu-latest
    needs:
      - verify-secrets
      - require-ci-success
      - build-and-push-backend-image
      - migrate-staging
      - deploy-staging-vercel
      - smoke-test-staging
      - migrate-production
      - deploy-production-vercel
      - smoke-test-production
      - summarize-cd
    if: failure()
    steps:
      - name: Notify Slack on CD failure
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          REF_NAME: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          SHA: ${{ github.sha }}
          VERIFY_RESULT: ${{ needs.verify-secrets.result }}
          CI_GATE_RESULT: ${{ needs.require-ci-success.result }}
          IMAGE_RESULT: ${{ needs.build-and-push-backend-image.result }}
          MIGRATE_STG_RESULT: ${{ needs.migrate-staging.result }}
          DEPLOY_STG_RESULT: ${{ needs.deploy-staging-vercel.result }}
          SMOKE_STG_RESULT: ${{ needs.smoke-test-staging.result }}
          MIGRATE_PROD_RESULT: ${{ needs.migrate-production.result }}
          DEPLOY_PROD_RESULT: ${{ needs.deploy-production-vercel.result }}
          SMOKE_PROD_RESULT: ${{ needs.smoke-test-production.result }}
        run: |
          if [ -z "${SLACK_WEBHOOK_URL:-}" ]; then
            echo "SLACK_WEBHOOK_URL is not configured; skipping notification."
            exit 0
          fi
          FAILED=""
          [ "$VERIFY_RESULT" = "failure" ] && FAILED="${FAILED} verify-secrets"
          [ "$CI_GATE_RESULT" = "failure" ] && FAILED="${FAILED} require-ci-success"
          [ "$IMAGE_RESULT" = "failure" ] && FAILED="${FAILED} build-and-push-backend-image"
          [ "$MIGRATE_STG_RESULT" = "failure" ] && FAILED="${FAILED} migrate-staging"
          [ "$DEPLOY_STG_RESULT" = "failure" ] && FAILED="${FAILED} deploy-staging-vercel"
          [ "$SMOKE_STG_RESULT" = "failure" ] && FAILED="${FAILED} smoke-test-staging"
          [ "$MIGRATE_PROD_RESULT" = "failure" ] && FAILED="${FAILED} migrate-production"
          [ "$DEPLOY_PROD_RESULT" = "failure" ] && FAILED="${FAILED} deploy-production-vercel"
          [ "$SMOKE_PROD_RESULT" = "failure" ] && FAILED="${FAILED} smoke-test-production"
          FAILED=$(echo "$FAILED" | xargs)
          [ -z "$FAILED" ] && FAILED="unknown"
          MSG="CD failed: ${REPO} @ ${REF_NAME} actor=${ACTOR} sha=${SHA}. failed_jobs=[${FAILED}] https://github.com/${REPO}/actions/runs/${RUN_ID}"
          payload=$(printf '{"text":"%s"}' "$MSG")
          curl -fsS -X POST -H "Content-Type: application/json" --data "$payload" "$SLACK_WEBHOOK_URL"

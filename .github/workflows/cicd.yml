name: CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-ci:
    name: Frontend Lint/Test/Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Run frontend quality gate
        working-directory: frontend
        run: |
          npm ci
          npm run lint
          npm run test:run
          npm run build

  backend-ci:
    name: Backend Vet/Test/Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - name: Run backend quality gate
        working-directory: backend
        run: |
          go vet ./...
          go test ./... -count=1 -timeout 15m
          go build ./...

  integration-test:
    name: Integration Test (PostgreSQL/Redis)
    needs: [frontend-ci, backend-ci]
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: blackjack
          POSTGRES_PASSWORD: blackjack
          POSTGRES_DB: blackjack
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U blackjack -d blackjack"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - name: Run migrations in pipeline
        working-directory: backend
        env:
          DATABASE_URL: postgres://blackjack:blackjack@localhost:5432/blackjack?sslmode=disable
        run: go run ./migrations/migrate.go
      - name: Integration smoke and tests
        working-directory: backend
        env:
          DATABASE_URL: postgres://blackjack:blackjack@localhost:5432/blackjack?sslmode=disable
          REDIS_ADDR: localhost:6379
          JWT_SECRET: ci-jwt-secret-min-16bytes!!
        run: |
          go test ./... -count=1 -timeout 15m
          go run . > /tmp/backend.log 2>&1 &
          echo $! > /tmp/backend.pid
          for i in $(seq 1 40); do
            if curl -fsS http://127.0.0.1:8080/health >/dev/null; then
              break
            fi
            sleep 1
          done
          curl -fsS http://127.0.0.1:8080/health >/dev/null
      - name: Stop backend
        if: always()
        run: |
          if [ -f /tmp/backend.pid ]; then kill "$(cat /tmp/backend.pid)" 2>/dev/null || true; fi
          if [ -f /tmp/backend.log ]; then cat /tmp/backend.log; fi

  container-build:
    name: Container Build
    needs: [integration-test]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - name: Build backend image
        run: docker build -t blackjack-backend:ci "./backend"
      - name: Build frontend image
        run: docker build -t blackjack-frontend:ci "./frontend"

  security-scan:
    name: Security Scan
    needs: [integration-test]
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: gosec
        working-directory: backend
        run: go run github.com/securego/gosec/v2/cmd/gosec@latest ./...
      - name: npm audit
        working-directory: frontend
        run: |
          npm ci
          npm audit --audit-level=high
      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"
      - name: gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-images:
    name: Publish Docker Images (GHCR)
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    needs: [container-build, security-scan]
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Backend Docker metadata
        id: meta_backend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/backend
          tags: |
            type=sha,prefix=main-
            type=raw,value=latest
      - name: Frontend Docker metadata
        id: meta_frontend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/frontend
          tags: |
            type=sha,prefix=main-
            type=raw,value=latest
      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta_backend.outputs.tags }}
          labels: ${{ steps.meta_backend.outputs.labels }}
      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta_frontend.outputs.tags }}
          labels: ${{ steps.meta_frontend.outputs.labels }}

  smoke-test:
    name: Smoke Test (API)
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    needs: [container-build, security-scan, publish-images]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
      - name: Install ws client dependency
        run: npm install ws@8
      - name: API smoke (/health, /api/me, room create+join, ws sync)
        env:
          API_BASE_URL: ${{ secrets.PRODUCTION_API_BASE_URL }}
        run: |
          set -euo pipefail
          ORIGIN="${API_BASE_URL%/api}"
          curl -fsS "$ORIGIN/health" >/dev/null

          # GitHub 上では RUN_ID + 乱数で衝突・並列実行を避ける（ローカル検証時は 0 相当）
          USER="smoke_${GITHUB_RUN_ID:-0}_${RANDOM}_$(date +%s)"
          EMAIL="${USER}@smoke.local"
          PASS="password12"
          SIGNUP=""
          for attempt in 1 2 3 4 5; do
            rm -f cookies.txt
            HTTP=$(curl -sS -o /tmp/smoke_signup.json -w "%{http_code}" -c cookies.txt -b cookies.txt \
              -H "Content-Type: application/json" \
              -d "{\"username\":\"$USER\",\"email\":\"$EMAIL\",\"password\":\"$PASS\"}" \
              "$API_BASE_URL/auth/signup") || true
            SIGNUP=$(cat /tmp/smoke_signup.json)
            if [ "$HTTP" = "201" ] || [ "$HTTP" = "200" ]; then
              SIGNUP_SUCCESS=$(echo "$SIGNUP" | jq -r '.success // false')
              if [ "$SIGNUP_SUCCESS" = "true" ]; then
                break
              fi
            fi
            echo "signup attempt $attempt: http_status=$HTTP body=$SIGNUP"
            if [ "$attempt" -eq 5 ]; then
              echo "Hint: internal_error は本番の DB マイグレーション未適用・接続不良・JWT_SECRET などサーバー側要因のことがあります。ホストのログを確認してください。"
              exit 1
            fi
            sleep 6
          done
          CSRF=$(echo "$SIGNUP" | jq -r '.data.csrf_token // ""')

          LOGIN=$(curl -sS -c cookies.txt -b cookies.txt -H "Content-Type: application/json" \
            -d "{\"email\":\"$EMAIL\",\"password\":\"$PASS\"}" "$API_BASE_URL/auth/login")
          TOKEN=$(echo "$LOGIN" | jq -r '.data.access_token // empty')
          if [ -z "$CSRF" ]; then
            CSRF=$(echo "$LOGIN" | jq -r '.data.csrf_token // ""')
          fi
          AUTH_ARGS=()
          if [ -n "$TOKEN" ]; then
            AUTH_ARGS=(-H "Authorization: Bearer $TOKEN")
          fi

          ME_STATUS=$(curl -sS -o /tmp/smoke_me.json -w "%{http_code}" -c cookies.txt -b cookies.txt "${AUTH_ARGS[@]}" "$API_BASE_URL/me")
          if [ "$ME_STATUS" -lt 200 ] || [ "$ME_STATUS" -ge 300 ]; then
            echo "/api/me failed (status=$ME_STATUS)"
            cat /tmp/smoke_me.json
            exit 1
          fi

          ROOM=$(curl -sS -c cookies.txt -b cookies.txt "${AUTH_ARGS[@]}" -H "X-CSRF-Token: $CSRF" \
            -X POST "$API_BASE_URL/rooms")
          ROOM_SUCCESS=$(echo "$ROOM" | jq -r '.success // false')
          if [ "$ROOM_SUCCESS" != "true" ]; then
            echo "room create failed: $ROOM"
            exit 1
          fi
          ROOM_ID=$(echo "$ROOM" | jq -r '.data.room.id')
          test -n "$ROOM_ID" && test "$ROOM_ID" != "null"

          JOIN=$(curl -sS -c cookies.txt -b cookies.txt "${AUTH_ARGS[@]}" -H "X-CSRF-Token: $CSRF" \
            -X POST "$API_BASE_URL/rooms/$ROOM_ID/join")
          JOIN_SUCCESS=$(echo "$JOIN" | jq -r '.success // false')
          if [ "$JOIN_SUCCESS" != "true" ]; then
            echo "room join failed: $JOIN"
            exit 1
          fi

          WS_URL="${ORIGIN/http/ws}/ws/rooms/$ROOM_ID"
          WS_URL="$WS_URL" COOKIE_FILE="cookies.txt" TOKEN="$TOKEN" node <<'NODE'
          const fs = require('fs');
          const WebSocket = require('ws');
          const wsUrl = process.env.WS_URL;
          const token = process.env.TOKEN || '';
          const cookieLines = fs.readFileSync(process.env.COOKIE_FILE, 'utf8')
            .split('\n')
            .filter((l) => l && !l.startsWith('#'));
          const cookie = cookieLines.map((l) => {
            const cols = l.split('\t');
            return `${cols[5]}=${cols[6]}`;
          }).join('; ');
          const ws = new WebSocket(wsUrl, { headers: { Cookie: cookie } });
          const timer = setTimeout(() => { process.exit(1); }, 10000);
          ws.on('open', () => {
            if (token) {
              ws.send(JSON.stringify({
                type: 'AUTH',
                request_id: `smoke-auth-${Date.now()}`,
                access_token: token,
              }));
            }
            ws.send(JSON.stringify({
              type: 'ROOM_SYNC_REQUEST',
              request_id: `smoke-sync-${Date.now()}`,
            }));
          });
          ws.on('message', (msg) => {
            try {
              const data = JSON.parse(String(msg));
              if (data.type === 'ROOM_STATE_SYNC') {
                clearTimeout(timer);
                ws.close();
                process.exit(0);
              }
            } catch (_) {}
          });
          ws.on('error', () => process.exit(1));
          NODE

  k6-load:
    name: k6 Load Test (100 users / 5 min)
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    needs: [smoke-test]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - name: Ensure k6 scenario exists
        run: test -f "k6/scenarios/spec_api.js"
      - name: Run k6 scenario
        env:
          K6_API_BASE_URL: ${{ secrets.PRODUCTION_API_BASE_URL }}
        run: |
          docker run --rm --network=host \
            -v "${GITHUB_WORKSPACE}/k6:/k6:ro" \
            -e K6_API_BASE_URL="$K6_API_BASE_URL" \
            -e K6_VUS=100 \
            -e K6_DURATION=5m \
            grafana/k6:0.55.0 run /k6/scenarios/spec_api.js

  deploy-production:
    name: Deploy to Vercel Production
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    needs: [smoke-test, k6-load]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
      - name: Install Vercel CLI
        run: npm install --global vercel@latest
      - uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - name: Execute migration (production)
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
        run: go run ./migrations/migrate.go
      - name: Pull project settings
        working-directory: frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
      - name: Build production artifact
        working-directory: frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel build --prod --token="$VERCEL_TOKEN"
      - name: Deploy to production
        working-directory: frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
